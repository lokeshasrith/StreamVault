services:
  - type: web
    name: streamvault-api
    runtime: docker
    dockerfilePath: streamvault/streamvault-api/StreamVault.Api/Dockerfile
    dockerContext: streamvault/streamvault-api/StreamVault.Api
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__Key
        sync: false          # Set manually in Render dashboard (secret)
      - key: Jwt__Issuer
        value: StreamVault
      - key: Jwt__Audience
        value: StreamVault
      - key: Tmdb__ApiKey
        value: "bd7e55dec425e38fa6389ee2f088543f"
      - key: ExternalApis__TmdbApiKey
        value: "bd7e55dec425e38fa6389ee2f088543f"
      - key: TMDB_API_KEY
        value: "bd7e55dec425e38fa6389ee2f088543f"
      - key: AllowedOrigins
        value: "https://lokeshasrith.github.io"
      - key: ConnectionStrings__Default
        value: "Data Source=/tmp/streamvault.db"
