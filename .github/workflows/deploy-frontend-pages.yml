name: Deploy Frontend To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: streamvault-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: streamvault-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_BASE_URL: https://streamvault-api-w9z8.onrender.com
        run: npm run build

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: streamvault-frontend/dist

      - name: Deploy (attempt 1)
        id: deploy_primary
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Deploy (retry attempt)
        id: deploy_retry
        if: steps.deploy_primary.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Fail if deploy did not succeed
        if: steps.deploy_primary.outcome == 'failure' && steps.deploy_retry.outcome == 'failure'
        run: |
          echo "GitHub Pages deployment failed on both attempts."
          exit 1
